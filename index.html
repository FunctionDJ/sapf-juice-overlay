<html>
	<head>
		<style>
			* {
				padding: 0;
				margin: 0;
			}
		</style>
	</head>

	<body style="background: #242321; overflow: hidden">
		<div
			style="
				width: 100vw;
				aspect-ratio: 16/9;
				max-height: 100vh;
				outline: 1px solid red;
				outline-offset: -1px;
				position: relative;
				margin: 0 auto;
			"
		>
			<div
				style="
					aspect-ratio: 16/9;
					background-image: url(&quot;/overlay-wip.png&quot;);
					background-size: contain;
					position: absolute;
					top: 0;
					left: 0;
					width: 100%;
					z-index: 10;
				"
			></div>
			<div
				style="
					position: absolute;
					top: 0;
					left: 0;
					height: 100%;
					width: 100%;
					z-index: 5;
				"
			>
				<canvas
					data-fill-color="#fecf64"
					id="canvas-left"
					width="500"
					height="1080"
					style="display: block; height: 100%; width: auto; position: absolute"
				></canvas>
				<canvas
					data-fill-color="#86ff5c"
					id="canvas-right"
					width="500"
					height="1080"
					style="
						display: block;
						height: 100%;
						width: auto;
						position: absolute;
						right: 0;
					"
				></canvas>
			</div>

			<div
				style="
					position: absolute;
					top: 20%;
					left: 10%;
					z-index: 20;
					display: flex;
					flex-direction: column;
					gap: 10px;
				"
			>
				<div>
					<button id="decrement" style="width: 20px">-</button>
					<button id="increment" style="width: 20px">+</button>
				</div>
				<select id="fruit-left" style="min-width: 80px"></select>
			</div>
			<div
				style="
					position: absolute;
					top: 20%;
					right: 10%;
					z-index: 20;
					display: flex;
					flex-direction: column;
					gap: 10px;
				"
			>
				<div>
					<button id="decrement-right" style="width: 20px">-</button>
					<button id="increment-right" style="width: 20px">+</button>
				</div>
				<select id="fruit-right" style="min-width: 80px"></select>
			</div>
		</div>
		<script src="src/main.ts" type="module"></script>
	</body>
</html>
