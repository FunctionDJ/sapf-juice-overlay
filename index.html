<html>
	<head>
		<style>
			* {
				padding: 0;
				margin: 0;
			}
		</style>
	</head>

	<body style="background: #242321; overflow: hidden">
		<div
			style="
				aspect-ratio: 16/9;
				outline: 1px solid red;
				outline-offset: -1px;
				position: relative;
			"
		>
			<div
				style="
					aspect-ratio: 16/9;
					background-image: url(&quot;/overlay-wip.png&quot;);
					background-size: contain;
					position: absolute;
					top: 0;
					left: 0;
					width: 100%;
					z-index: 10;

				"
			></div>
			<div
				style="
					position: absolute;
					top: 50%;
					transition: top 3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
				"
			>
				<canvas
					data-fill-color="#fecf64"
					id="canvas"
					width="500px"
					height="3000px"
					style="
						display: block;
						width: 20vw;
						position: absolute;
						transform: translateY(-50%);
						border: 3px solid black;
					"
				></canvas>
			</div>

			<div style="position: absolute; top: 20%; left: 30%; z-index: 20">
				<button id="decrement" style="width: 20px" onclick="decrement(0)">-</button>
				<button id="increment" style="width: 20px" onclick="increment(0)">+</button>
			</div>
		</div>
		<script src="src/main.ts" type="module"></script>
		<script src="src/juice-level.ts" type="module"></script>
	</body>
</html>
